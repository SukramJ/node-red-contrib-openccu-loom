version: 2
updates:
  # npm runtime + dev dependencies (grouped to reduce PR noise)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    reviewers:
      - "SukramJ"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 7
    groups:
      npm-dependencies:
        patterns:
          - "*"

  # GitHub Actions (pinned to SHAs / tags) kept up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    reviewers:
      - "SukramJ"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
